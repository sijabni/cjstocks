<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Portfolio Monitor + Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #1a1a1a; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #005a9e; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; margin-top: 0; }
        
        .dashboard-top { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 25px; }
        .summary-bar { display: grid; grid-template-columns: 1fr; gap: 15px; background: #005a9e; color: white; padding: 20px; border-radius: 8px; }
        .chart-container { background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #e1e4e8; height: 300px; display: flex; flex-direction: column; align-items: center; }
        
        .stat-card h4 { margin: 0; font-size: 11px; text-transform: uppercase; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e4e8; align-items: end; }
        .controls input { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        
        button { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 11px; }
        .btn-add { background: #107c10; color: white; }
        .btn-refresh { background: #0078d4; color: white; }
        .btn-delete { background: #d13438; color: white; }
        .btn-edit { background: #ffaa00; color: #1a1a1a; margin-right: 4px; }
        .btn-csv { background: #444; color: white; }
        .btn-cancel { background: #666; color: white; display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .group-header { background-color: #f1f8ff; font-weight: bold; color: #005a9e; cursor: pointer; }
        .expand-icon { display: inline-block; width: 15px; transition: transform 0.2s; }
        .expanded .expand-icon { transform: rotate(90deg); }
        .lot-row { display: none; background-color: #ffffff; font-size: 13px; }
        .lot-row.show { display: table-row; }
        .lot-row td { padding-left: 35px; border-bottom: 1px dashed #eee; }
        .gain { color: #107c10; font-weight: bold; }
        .loss { color: #d13438; font-weight: bold; }
        #status { font-size: 13px; color: #0078d4; margin-bottom: 15px; font-weight: 500; }
        .edit-mode { background: #fff9e6 !important; border: 1px solid #ffaa00 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Portfolio Monitor Master + Allocation</h2>
    
    <div class="dashboard-top">
        <div class="summary-bar">
            <div class="stat-card"><h4>Total Value</h4><p id="totalVal">$0.00</p></div>
            <div class="stat-card"><h4>Passive Income (4%)</h4><p id="passiveInc">$0.00</p></div>
            <div class="stat-card"><h4>Lots Tracked</h4><p id="lotCount">0</p></div>
        </div>
        <div class="chart-container">
            <h4 style="margin: 0 0 10px 0; font-size: 12px; color: #666;">ASSET ALLOCATION</h4>
            <canvas id="allocationChart"></canvas>
        </div>
    </div>

    <div id="status">Ready</div>

    <div class="controls" id="inputForm">
        <div><input type="text" id="tickerInput" placeholder="Ticker"></div>
        <div><input type="number" id="sharesInput" placeholder="Shares"></div>
        <div><input type="number" step="0.01" id="priceInput" placeholder="Price"></div>
        <div><input type="date" id="dateInput"></div>
        <button class="btn-add" id="saveBtn" onclick="saveStock()">Save Asset</button>
        <button class="btn-cancel" id="cancelBtn" onclick="resetForm()">Cancel</button>
        <button class="btn-csv" onclick="exportCSV()">Export</button>
        <button class="btn-csv" onclick="document.getElementById('csvFile').click()">Import</button>
        <input type="file" id="csvFile" style="display:none" accept=".csv" onchange="importCSV(this)">
        <button class="btn-refresh" onclick="fetchPortfolio()">Refresh</button>
    </div>

    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Ticker / Date</th>
                <th>Shares</th>
                <th>Price/Cost</th>
                <th>Current Value</th>
                <th>Gain/Loss</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const API_URL = 'https://cjstocks-gpgmhnf0eba9c8c8.canadacentral-01.azurewebsites.net/api/get_portfolio';
    let isEditMode = false;
    let rawPortfolioData = [];
    let myChart = null;

    async function fetchPortfolio() {
        const status = document.getElementById('status');
        const tableBody = document.getElementById('tableBody');
        status.innerText = "Synchronizing Data...";
        
        try {
            const response = await fetch(API_URL);
            rawPortfolioData = await response.json();
            
            const groups = new Map();
            const allocData = {}; // Dynamically populated from backend categories
            let totalVal = 0; 
            let totalGL = 0;

            rawPortfolioData.forEach(item => {
                const shares = parseFloat(item.shares) || 0;
                const price = parseFloat(item.price_bought) || 0;
                const gl = parseFloat(item.gain_loss) || 0;
                
                // Market Value Calculation
                const marketVal = (shares * price) + gl;
                
                // Use the 'category' sent from the Python backend (get_exhaustive_data)
                const cat = item.category || 'Other';
                allocData[cat] = (allocData[cat] || 0) + marketVal;

                totalVal += marketVal; 
                totalGL += gl;

                if (!groups.has(item.ticker)) {
                    groups.set(item.ticker, { ticker: item.ticker, totalShares: 0, totalCost: 0, totalGL: 0, lots: [] });
                }
                const g = groups.get(item.ticker);
                g.totalShares += shares; 
                g.totalCost += (shares * price); 
                g.totalGL += gl;
                g.lots.push({ ...item, marketVal, gl });
            });

            updateChart(allocData);
            renderTable(groups);

            document.getElementById('totalVal').innerText = `$${totalVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('passiveInc').innerText = `$${(totalVal * 0.04).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('lotCount').innerText = rawPortfolioData.length;
            status.innerText = "✅ Updated.";
        } catch (e) { 
            status.innerText = "❌ Error Fetching Data."; 
            console.error(e);
        }
    }

    function updateChart(data) {
        const ctx = document.getElementById('allocationChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        // Dynamic palette for various sectors
        const colors = ['#0078d4', '#107c10', '#ffaa00', '#d13438', '#7fba00', '#002050', '#8c564b', '#e377c2', '#7f7f7f', '#bcbd22', '#17becf'];

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{
                    data: Object.values(data),
                    backgroundColor: colors,
                    borderWidth: 1
                }]
            },
            options: { 
                cutout: '70%', 
                maintainAspectRatio: false,
                plugins: { 
                    legend: { 
                        position: 'bottom', 
                        labels: { boxWidth: 10, font: { size: 10 } } 
                    } 
                } 
            }
        });
    }

    function renderTable(groups) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "";
        Array.from(groups.keys()).sort().forEach(ticker => {
            const g = groups.get(ticker);
            const avg = g.totalCost / g.totalShares;
            const mVal = g.totalCost + g.totalGL;
            const hRow = document.createElement('tr');
            hRow.className = 'group-header';
            hRow.onclick = () => toggle(ticker, hRow);
            hRow.innerHTML = `<td><span class="expand-icon">▶</span> ${ticker}</td><td>${g.totalShares}</td><td>$${avg.toFixed(2)}</td><td>$${mVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</td><td class="${g.totalGL>=0?'gain':'loss'}">$${g.totalGL.toLocaleString()}</td><td>Summary</td>`;
            tableBody.appendChild(hRow);

            g.lots.sort((a, b) => new Date(a.date_added) - new Date(b.date_added)).forEach(lot => {
                const lRow = document.createElement('tr');
                lRow.className = `lot-row lot-${ticker}`;
                lRow.innerHTML = `<td>📅 ${lot.date_added}</td><td>${lot.shares}</td><td>$${parseFloat(lot.price_bought).toFixed(2)}</td><td>$${lot.marketVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</td><td class="${lot.gl>=0?'gain':'loss'}">$${lot.gl.toLocaleString()}</td>
                    <td>
                        <button class="btn-edit" onclick="event.stopPropagation(); prepareEdit('${lot.ticker}', ${lot.shares}, ${lot.price_bought}, '${lot.date_added}')">Edit</button>
                        <button class="btn-delete" onclick="event.stopPropagation(); deleteAsset('${lot.ticker}', '${lot.date_added}')">Delete</button>
                    </td>`;
                tableBody.appendChild(lRow);
            });
        });
    }

    function toggle(t, el) {
        el.classList.toggle('expanded');
        document.querySelectorAll(`.lot-${t}`).forEach(l => l.classList.toggle('show'));
        el.querySelector('.expand-icon').innerText = el.classList.contains('expanded') ? '▼' : '▶';
    }

    // CRUD and Bulk functions (Export/Import) remain as previously provided
    async function saveStock() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase();
        const shares = document.getElementById('sharesInput').value;
        const price = document.getElementById('priceInput').value;
        const date = document.getElementById('dateInput').value;
        if(!ticker || !shares) return;
        const method = isEditMode ? 'PUT' : 'POST';
        await fetch(API_URL, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ticker, shares: parseFloat(shares), purchase_price: parseFloat(price), purchase_date: date })
        });
        resetForm(); fetchPortfolio();
    }

    function prepareEdit(t, s, p, d) {
        isEditMode = true;
        document.getElementById('tickerInput').value = t;
        document.getElementById('tickerInput').disabled = true;
        document.getElementById('sharesInput').value = s;
        document.getElementById('priceInput').value = p;
        document.getElementById('dateInput').value = d;
        document.getElementById('saveBtn').innerText = "Update";
        document.getElementById('cancelBtn').style.display = "inline-block";
        document.getElementById('inputForm').classList.add('edit-mode');
        window.scrollTo(0,0);
    }

    async function deleteAsset(ticker, date) {
        if(!confirm(`Delete ${ticker} from ${date}?`)) return;
        await fetch(API_URL, {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ticker, purchase_date: date })
        });
        fetchPortfolio();
    }

    function exportCSV() {
        let rows = ["Ticker,Shares,Price,Date"];
        rawPortfolioData.forEach(i => rows.push(`${i.ticker},${i.shares},${i.price_bought},${i.date_added}`));
        const b = new Blob([rows.join("\n")], {type: 'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "Portfolio.csv"; a.click();
    }

    async function importCSV(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split("\n").slice(1);
            for(let l of lines) {
                const [t, s, p, d] = l.split(",");
                if(t) await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ticker: t.trim(), shares: parseFloat(s), purchase_price: parseFloat(p), purchase_date: d.trim() })});
            }
            fetchPortfolio();
        };
        reader.readAsText(input.files[0]);
    }

    function resetForm() {
        isEditMode = false;
        document.getElementById('tickerInput').value = "";
        document.getElementById('tickerInput').disabled = false;
        document.getElementById('sharesInput').value = "";
        document.getElementById('priceInput').value = "";
        document.getElementById('dateInput').value = "";
        document.getElementById('saveBtn').innerText = "Save Asset";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('inputForm').classList.remove('edit-mode');
    }

    fetchPortfolio();
</script>
</body>
</html>
