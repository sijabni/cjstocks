<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Monitor - Advanced View</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #1a1a1a; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #005a9e; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; margin-top: 0; }
        
        /* Summary Bar */
        .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; background: #005a9e; color: white; padding: 20px; border-radius: 8px; }
        .stat-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }

        /* Form Styling */
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e4e8; align-items: end; }
        .controls input { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        /* Button Styling */
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 12px; }
        .btn-add { background: #107c10; color: white; }
        .btn-edit { background: #ffaa00; color: #1a1a1a; margin-right: 5px; }
        .btn-refresh { background: #0078d4; color: white; }
        .btn-delete { background: #d13438; color: white; }
        .btn-csv-export { background: #2b579a; color: white; }
        .btn-csv-import { background: #217346; color: white; }
        .btn-cancel { background: #666; color: white; display: none; }
        button:hover { filter: brightness(90%); transform: translateY(-1px); }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 14px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #fafbfc; color: #444; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .gain { color: #107c10; font-weight: bold; }
        .loss { color: #d13438; font-weight: bold; }
        
        #status { font-size: 13px; color: #0078d4; margin-bottom: 15px; font-weight: 500; min-height: 1.2em; }
        .edit-mode { background: #fff9e6 !important; border: 1px solid #ffaa00 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Portfolio Performance Monitor</h2>
    
    <div class="summary-bar">
        <div class="stat-card">
            <h4>Total Portfolio Value</h4>
            <p id="totalVal">$0.00</p>
        </div>
        <div class="stat-card">
            <h4>Annual Passive Income (4%)</h4>
            <p id="passiveInc">$0.00</p>
        </div>
        <div class="stat-card">
            <h4>Stock Count</h4>
            <p id="stockCount">0</p>
        </div>
    </div>

    <div id="status">System Ready</div>

    <div class="controls" id="inputForm">
        <div><input type="text" id="tickerInput" placeholder="Ticker"></div>
        <div><input type="number" id="sharesInput" placeholder="Shares"></div>
        <div><input type="number" step="0.01" id="priceInput" placeholder="Price Bought"></div>
        <div><input type="date" id="dateInput"></div>
        
        <button class="btn-add" id="saveBtn" onclick="saveStock()">Save Asset</button>
        <button class="btn-cancel" id="cancelBtn" onclick="resetForm()">Cancel</button>
        
        <button class="btn-csv-export" onclick="exportCSV()">Export CSV</button>
        <button class="btn-csv-import" onclick="document.getElementById('csvFile').click()">Import CSV</button>
        <input type="file" id="csvFile" style="display:none" accept=".csv" onchange="importCSV(this)">
        
        <button class="btn-refresh" onclick="fetchPortfolio()">Refresh</button>
    </div>

    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Shares</th>
                <th>Price Bought</th>
                <th>Date Added</th>
                <th>Gain/Loss</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_URL = 'https://cjstocks-gpgmhnf0eba9c8c8.canadacentral-01.azurewebsites.net/api/get_portfolio';
    let isEditMode = false;
    let portfolioData = [];

    // --- 1. FETCH & SUMMARY ---
    async function fetchPortfolio() {
        const status = document.getElementById('status');
        const tableBody = document.querySelector('#portfolioTable tbody');
        status.innerText = "🛰️ Synchronizing with Azure SQL...";
        
        try {
            const response = await fetch(API_URL);
            portfolioData = await response.json();
            
            tableBody.innerHTML = ""; 
            let totalValue = 0;

            portfolioData.forEach(item => {
                const gl = parseFloat(item.gain_loss) || 0;
                const priceValue = item.price_bought ? parseFloat(item.price_bought).toFixed(2) : "";
                
                // Track total value for the summary cards
                // Note: In a real app, you'd add (current_price * shares). 
                // For now, we'll estimate total based on purchase + gain/loss
                totalValue += (parseFloat(item.price_bought || 0) * parseFloat(item.shares || 0)) + gl;

                const row = `<tr>
                    <td><strong>${item.ticker}</strong></td>
                    <td>${item.shares}</td>
                    <td>${item.price_bought ? '$' + priceValue : '—'}</td>
                    <td>${item.date_added || '—'}</td>
                    <td class="${gl >= 0 ? 'gain' : 'loss'}">$${gl.toLocaleString()}</td>
                    <td>
                        <button class="btn-edit" onclick="editStock('${item.ticker}', ${item.shares}, '${priceValue}', '${item.date_added}')">Edit</button>
                        <button class="btn-delete" onclick="deleteStock('${item.ticker}')">Delete</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            // Update Summary Cards
            document.getElementById('totalVal').innerText = `$${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('passiveInc').innerText = `$${(totalValue * 0.04).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('stockCount').innerText = portfolioData.length;
            
            status.innerText = "✅ Live Data Updated.";
        } catch (err) {
            status.innerText = "❌ Connection Error.";
        }
    }

    // --- 2. CSV EXPORT ---
    function exportCSV() {
        let csvRows = ["Ticker,Shares,PriceBought,DateAdded"];
        portfolioData.forEach(item => {
            csvRows.push(`${item.ticker},${item.shares},${item.price_bought},${item.date_added}`);
        });
        const blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Portfolio_Backup_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    // --- 3. CSV IMPORT ---
    function importCSV(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async function(e) {
            const rows = e.target.result.split("\n").slice(1);
            document.getElementById('status').innerText = "⏳ Processing bulk upload...";
            for (let row of rows) {
                const [ticker, shares, price, date] = row.split(",");
                if(ticker) {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticker, shares: parseFloat(shares), purchase_price: parseFloat(price), purchase_date: date.trim() })
                    });
                }
            }
            fetchPortfolio();
        };
        reader.readAsText(file);
    }

    // --- 4. CRUD OPERATIONS ---
    async function saveStock() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase();
        const shares = document.getElementById('sharesInput').value;
        const price = document.getElementById('priceInput').value;
        const date = document.getElementById('dateInput').value;
        if (!ticker || !shares) return alert("Ticker and Shares required.");

        const method = isEditMode ? 'PUT' : 'POST';
        await fetch(API_URL, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, shares: parseFloat(shares), purchase_price: price ? parseFloat(price) : null, purchase_date: date })
        });
        resetForm();
        fetchPortfolio();
    }

    async function deleteStock(ticker) {
        if (!confirm(`⚠️ DELETE WARNING: Are you sure you want to remove ${ticker}?`)) return;
        await fetch(API_URL, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker })
        });
        fetchPortfolio();
    }

    function editStock(ticker, shares, price, date) {
        isEditMode = true;
        document.getElementById('tickerInput').value = ticker;
        document.getElementById('tickerInput').disabled = true;
        document.getElementById('sharesInput').value = shares;
        document.getElementById('priceInput').value = price;
        document.getElementById('dateInput').value = date;
        document.getElementById('saveBtn').innerText = "Update Asset";
        document.getElementById('cancelBtn').style.display = "inline-block";
        document.getElementById('inputForm').classList.add('edit-mode');
    }

    function resetForm() {
        isEditMode = false;
        document.getElementById('tickerInput').value = "";
        document.getElementById('tickerInput').disabled = false;
        document.getElementById('sharesInput').value = "";
        document.getElementById('priceInput').value = "";
        document.getElementById('dateInput').value = "";
        document.getElementById('saveBtn').innerText = "Save Asset";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('inputForm').classList.remove('edit-mode');
    }

    fetchPortfolio();
</script>
</body>
</html>
