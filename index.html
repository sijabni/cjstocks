<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Monitor - Expandable Lots</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #1a1a1a; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #005a9e; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; margin-top: 0; }
        
        /* Summary Bar */
        .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; background: #005a9e; color: white; padding: 20px; border-radius: 8px; }
        .stat-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #fafbfc; color: #444; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }

        /* Group Header Styling */
        .ticker-header { background-color: #f8f9fa; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .ticker-header:hover { background-color: #eef5fb; }
        .expand-icon { display: inline-block; width: 20px; transition: transform 0.2s; color: #005a9e; }
        .expanded .expand-icon { transform: rotate(90deg); }

        /* Lot Row Styling (Hidden by default) */
        .lot-row { display: none; background-color: #ffffff; font-size: 13px; }
        .lot-row td { border-bottom: 1px dashed #eee; padding-left: 40px; }
        .show-lots { display: table-row; }

        .gain { color: #107c10; font-weight: bold; }
        .loss { color: #d13438; font-weight: bold; }
        button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-delete { background: #d13438; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Portfolio Monitor (Expandable Lots)</h2>
    
    <div class="summary-bar">
        <div class="stat-card"><h4>Total Portfolio Value</h4><p id="totalVal">$0.00</p></div>
        <div class="stat-card"><h4>Total Gain/Loss</h4><p id="totalGL">$0.00</p></div>
        <div class="stat-card"><h4>Unique Tickers</h4><p id="tickerCount">0</p></div>
    </div>

    <div id="status">Ready</div>

    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Total Shares</th>
                <th>Avg Cost</th>
                <th>Current Value</th>
                <th>Total Gain/Loss</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const API_URL = 'https://cjstocks-gpgmhnf0eba9c8c8.canadacentral-01.azurewebsites.net/api/get_portfolio';

    async function fetchPortfolio() {
        const status = document.getElementById('status');
        const tableBody = document.getElementById('tableBody');
        status.innerText = "🛰️ Fetching from Azure...";
        
        try {
            const response = await fetch(API_URL);
            const rawData = await response.json();
            
            // GROUP DATA BY TICKER
            const groups = {};
            rawData.forEach(item => {
                if (!groups[item.ticker]) {
                    groups[item.ticker] = {
                        ticker: item.ticker,
                        totalShares: 0,
                        totalCost: 0,
                        totalGL: 0,
                        lots: []
                    };
                }
                const shares = parseFloat(item.shares);
                const price = parseFloat(item.price_bought);
                const gl = parseFloat(item.gain_loss);

                groups[item.ticker].totalShares += shares;
                groups[item.ticker].totalCost += (shares * price);
                groups[item.ticker].totalGL += gl;
                groups[item.ticker].lots.push(item);
            });

            tableBody.innerHTML = ""; 
            let grandTotalVal = 0;
            let grandTotalGL = 0;

            Object.values(groups).sort((a,b) => a.ticker.localeCompare(b.ticker)).forEach(group => {
                const currentVal = group.totalCost + group.totalGL;
                const avgCost = group.totalCost / group.totalShares;
                grandTotalVal += currentVal;
                grandTotalGL += group.totalGL;

                // 1. Create Summary Header Row
                const headerRow = document.createElement('tr');
                headerRow.className = 'ticker-header';
                headerRow.onclick = () => toggleLots(group.ticker, headerRow);
                headerRow.innerHTML = `
                    <td><span class="expand-icon">▶</span> ${group.ticker}</td>
                    <td>${group.totalShares.toLocaleString()}</td>
                    <td>$${avgCost.toFixed(2)}</td>
                    <td>$${currentVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="${group.totalGL >= 0 ? 'gain' : 'loss'}">$${group.totalGL.toLocaleString()}</td>
                    <td><small>${group.lots.length} Lot(s)</small></td>
                `;
                tableBody.appendChild(headerRow);

                // 2. Create Hidden Lot Rows
                group.lots.sort((a,b) => new Date(a.date_added) - new Date(b.date_added)).forEach(lot => {
                    const lotRow = document.createElement('tr');
                    lotRow.className = `lot-row lot-of-${group.ticker}`;
                    const lotVal = (lot.shares * lot.price_bought) + lot.gain_loss;
                    
                    lotRow.innerHTML = `
                        <td><small>📅 ${lot.date_added}</small></td>
                        <td>${lot.shares}</td>
                        <td>$${parseFloat(lot.price_bought).toFixed(2)}</td>
                        <td>$${lotVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td class="${lot.gain_loss >= 0 ? 'gain' : 'loss'}">$${lot.gain_loss.toLocaleString()}</td>
                        <td><button class="btn-delete" onclick="event.stopPropagation(); deleteLot('${lot.ticker}', '${lot.date_added}')">Sell Lot</button></td>
                    `;
                    tableBody.appendChild(lotRow);
                });
            });

            document.getElementById('totalVal').innerText = `$${grandTotalVal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalGL').innerText = `$${grandTotalGL.toLocaleString()}`;
            document.getElementById('tickerCount').innerText = Object.keys(groups).length;
            status.innerText = "✅ Synchronized.";
        } catch (err) {
            status.innerText = "❌ Error Loading Data.";
        }
    }

    function toggleLots(ticker, element) {
        element.classList.toggle('expanded');
        const rows = document.querySelectorAll(`.lot-of-${ticker}`);
        rows.forEach(row => {
            row.classList.toggle('show-lots');
        });
        const icon = element.querySelector('.expand-icon');
        icon.innerText = element.classList.contains('expanded') ? '▼' : '▶';
    }

    async function deleteLot(ticker, date) {
        if (!confirm(`Confirm sale of ${ticker} lot bought on ${date}?`)) return;
        await fetch(API_URL, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, purchase_date: date })
        });
        fetchPortfolio();
    }

    fetchPortfolio();
</script>
</body>
</html>
