<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Monitor - Tax Lot View</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #1a1a1a; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #005a9e; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; margin-top: 0; }
        
        .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; background: #005a9e; color: white; padding: 20px; border-radius: 8px; }
        .stat-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e4e8; align-items: end; }
        .controls input { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 11px; }
        .btn-add { background: #107c10; color: white; }
        .btn-edit { background: #ffaa00; color: #1a1a1a; margin-right: 5px; }
        .btn-refresh { background: #0078d4; color: white; }
        .btn-delete { background: #d13438; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #fafbfc; color: #444; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
        
        /* Highlighting groups of the same stock */
        .ticker-group-header { background-color: #f1f8ff; font-weight: bold; color: #005a9e; }
        .gain { color: #107c10; font-weight: bold; }
        .loss { color: #d13438; font-weight: bold; }
        
        #status { font-size: 13px; color: #0078d4; margin-bottom: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Portfolio Monitor (Tax Lot View)</h2>
    
    <div class="summary-bar">
        <div class="stat-card"><h4>Total Value</h4><p id="totalVal">$0.00</p></div>
        <div class="stat-card"><h4>Active Tax Lots</h4><p id="lotCount">0</p></div>
        <div class="stat-card"><h4>Total Gain/Loss</h4><p id="totalGL">$0.00</p></div>
    </div>

    <div id="status">Ready</div>

    <div class="controls" id="inputForm">
        <div><input type="text" id="tickerInput" placeholder="Ticker"></div>
        <div><input type="number" id="sharesInput" placeholder="Shares"></div>
        <div><input type="number" step="0.01" id="priceInput" placeholder="Price Bought"></div>
        <div><input type="date" id="dateInput"></div>
        <button class="btn-add" id="saveBtn" onclick="saveStock()">Save Lot</button>
        <button class="btn-refresh" onclick="fetchPortfolio()">Refresh</button>
    </div>

    <table id="portfolioTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Date Bought</th>
                <th>Shares</th>
                <th>Cost/Share</th>
                <th>Current Value</th>
                <th>Lot Gain/Loss</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_URL = 'https://cjstocks-gpgmhnf0eba9c8c8.canadacentral-01.azurewebsites.net/api/get_portfolio';

    async function fetchPortfolio() {
        const status = document.getElementById('status');
        const tableBody = document.querySelector('#portfolioTable tbody');
        status.innerText = "🛰️ Fetching Tax Lots...";
        
        try {
            const response = await fetch(API_URL);
            let data = await response.json();
            
            // SORT DATA BY TICKER THEN DATE
            data.sort((a, b) => a.ticker.localeCompare(b.ticker) || new Date(a.date_added) - new Date(b.date_added));

            tableBody.innerHTML = ""; 
            let totalVal = 0;
            let totalGL = 0;
            let currentTicker = "";

            data.forEach(item => {
                const shares = parseFloat(item.shares);
                const price = parseFloat(item.price_bought);
                const gl = parseFloat(item.gain_loss);
                const marketVal = (shares * price) + gl;

                totalVal += marketVal;
                totalGL += gl;

                // Add a visual separator for different tickers
                if (item.ticker !== currentTicker) {
                    const groupRow = `<tr class="ticker-group-header"><td colspan="7">${item.ticker} Total Exposure</td></tr>`;
                    tableBody.innerHTML += groupRow;
                    currentTicker = item.ticker;
                }

                const row = `<tr>
                    <td style="padding-left: 25px;">${item.ticker}</td>
                    <td>${item.date_added}</td>
                    <td>${shares}</td>
                    <td>$${price.toFixed(2)}</td>
                    <td>$${marketVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="${gl >= 0 ? 'gain' : 'loss'}">$${gl.toLocaleString()}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteLot('${item.ticker}', '${item.date_added}')">Sell Lot</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            document.getElementById('totalVal').innerText = `$${totalVal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('lotCount').innerText = data.length;
            document.getElementById('totalGL').innerText = `$${totalGL.toLocaleString()}`;
            status.innerText = "✅ All lots synchronized.";
        } catch (err) {
            status.innerText = "❌ Connection Error.";
        }
    }

    async function saveStock() {
        const payload = {
            ticker: document.getElementById('tickerInput').value.toUpperCase(),
            shares: parseFloat(document.getElementById('sharesInput').value),
            purchase_price: parseFloat(document.getElementById('priceInput').value),
            purchase_date: document.getElementById('dateInput').value
        };
        
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        fetchPortfolio();
    }

    async function deleteLot(ticker, date) {
        if (!confirm(`Are you sure you want to sell the lot of ${ticker} from ${date}?`)) return;
        await fetch(API_URL, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, purchase_date: date })
        });
        fetchPortfolio();
    }

    fetchPortfolio();
</script>
</body>
</html>
