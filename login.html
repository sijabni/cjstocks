<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-box { width: 300px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0078d4; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>🔐 Portfolio Access</h3>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()">Login</button>
        <p id="errMsg" style="color:red; font-size:12px;"></p>
    </div>

    <script>
        async function doLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const err = document.getElementById('errMsg');

            const response = await fetch('https://cjstocks-gpgmhnf0eba9c8c8.canadacentral-01.azurewebsites.net/api/login', {
                method: 'POST',
                body: JSON.stringify({ username: user, password: pass })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token); // Save the token
                window.location.href = 'index.html'; // Go to dashboard
            } else {
                err.innerText = "Invalid username or password";
            }
        }
    </script>
</body>
</html>
