<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
 /* These styles ensure the card stays centered and compact */
        body.auth-page-body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-card.compact {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
        }

        .input-group { margin-bottom: 15px; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }

        .btn-primary { 
            width: 100%; 
            padding: 10px; 
            background: #0078d4; 
            color: white; 
            border: none; 
            border-radius: 6px;
            cursor: pointer; 
            font-weight: 600;
        }

        .toggle-container { margin-top: 15px; font-size: 13px; }
    </style>

</head>

<body class="auth-page-body">
    <div class="auth-card compact">
        <h2 id="formTitle">Login</h2>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button id="submitBtn" class="btn-primary" onclick="handleAuth()">Login</button>
        
        <p id="errMsg" style="color:red; font-size:11px; margin-top: 5px; min-height: 15px;"></p>

        <div class="toggle-container">
            <a href="javascript:void(0)" id="toggleLink" onclick="toggleMode()">Create account</a>
        </div>
    </div>

    <script>

    let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            // Clear any previous error messages when switching modes
            document.getElementById('errMsg').innerText = "";
            
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const link = document.getElementById('toggleLink');
            const text = document.getElementById('toggleText');
            if (isLoginMode) {
                // --- LOGIN STATE ---
                title.innerText = 'Login';
                btn.innerText = 'Login'; // Button says Login
                text.innerText = 'New to the app?';
                link.innerText = 'Create an account';
            } else {
                // --- REGISTER STATE ---
                title.innerText = 'Register';
                btn.innerText = 'Register'; // Button now says Register
                text.innerText = 'Already have an account?';
                link.innerText = 'Login here';
            }
        }

        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('errMsg');
            const submitBtn = document.getElementById('submitBtn');

            if (!user || !pass) {
                err.innerText = "Please enter both username and password.";
                 return;
            }

            // --- START LOADING STATE ---
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner"></span> Processing...`;
            errorDisplay.innerText = ""; // Clear old errors

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            try {
                const response = await fetch(`https://cjstocks1-arhsepcub2fufpez.canadacentral-01.azurewebsites.net${endpoint}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json' }, // Add this so the backend knows it is receiving JSON
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    if (isLoginMode) {
                        const data = await response.json();
                        localStorage.setItem('token', data.token); // Save the token
                        window.location.href = 'index.html'; // Go to dashboard
                    } else {
                        alert("Account created successfully! Please log in.");
                        toggleMode(); // Switch to login mode after successful registration
                    }
                } else {
                    const errorText = await response.text();
                    err.innerText = "Invalid username or password";
                }
            } catch (err) {
                err.innerText = "Connection error. Is the Azure Function running?";
            } finally {
                // --- END LOADING STATE ---
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
